<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 产品经理的 Agent 实战课</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="以 Claude Code 为教材，从「会用 AI」进阶到「会造 AI Agent 产品」">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <!-- Docsify Themes -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      --theme-color: #4b32c3;
      --sidebar-width: 280px;
      --sidebar-background: transparent;
      --sidebar-border-color: transparent;
      --sidebar-nav-link-color--active: #4b32c3;
      --sidebar-nav-link-border-color--active: #4b32c3;
      --blockquote-border-color: #4b32c3;
      --notice-tip-border-color: #4b32c3;
    }

    /* Base Body & Gradient Background */
    body {
      background-color: #f7f8f9;
      background-attachment: fixed;
    }
    
    /* Background Soft Orbs */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: 
        radial-gradient(circle at 15% 50%, rgba(124, 92, 252, 0.08), transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(92, 192, 252, 0.1), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(252, 92, 124, 0.08), transparent 40%);
      z-index: -2;
      pointer-events: none;
    }

    /* Overall White Noise Texture */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
      z-index: 9999;
      pointer-events: none;
    }

    /* Glassmorphism Sidebar */
    .sidebar {
      background: rgba(255, 255, 255, 0.3) !important;
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border-right: 1px solid rgba(255, 255, 255, 0.5) !important;
      box-shadow: 2px 0 20px rgba(0, 0, 0, 0.02);
    }
    
    /* Search box glass */
    .sidebar .search {
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }
    
    /* Glassmorphism Main Content Wrapper */
    .markdown-section {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      padding: 50px;
      margin-top: 40px !important;
      margin-bottom: 60px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
      max-width: 850px;
    }

    .markdown-section h1 {
      font-size: 2em;
      margin-top: 0;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }

    .markdown-section table th {
      background-color: rgba(124, 92, 252, 0.05);
      font-weight: 600;
    }

    .app-name-link img {
      max-width: 40px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .sidebar .app-name-link {
      font-size: 1.2em;
      font-weight: 700;
    }

    /* Custom badge styles */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75em;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
    }
    .badge-l2 { background: rgba(232, 245, 233, 0.8); color: #2e7d32; }
    .badge-l3 { background: rgba(255, 243, 224, 0.8); color: #e65100; }
    .badge-l4 { background: rgba(252, 228, 236, 0.8); color: #c62828; }

    /* Better code blocks */
    .markdown-section pre {
      background: rgba(240, 240, 245, 0.6) !important;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.01);
    }
    .markdown-section code {
      border-radius: 6px;
      background: rgba(240, 240, 245, 0.8);
    }

    /* Progress indicator */
    .progress-bar {
      height: 4px;
      background: linear-gradient(90deg, #7c5cfc, #a78bfa);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      transition: width 0.3s;
    }

    /* Callout boxes */
    .callout {
      padding: 16px 20px;
      border-radius: 12px;
      margin: 16px 0;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .callout-tip {
      background: rgba(124, 92, 252, 0.05);
      border-left: 4px solid #7c5cfc;
    }
    .callout-warn {
      background: rgba(255, 152, 0, 0.05);
      border-left: 4px solid #ff9800;
    }
    .callout-pm {
      background: rgba(76, 175, 80, 0.05);
      border-left: 4px solid #4caf50;
    }

    /* Cover page Glassmorphism */
    section.cover {
      background: transparent !important;
    }
    section.cover .cover-main {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      padding: 60px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.04);
      z-index: 1; /* Keep above background */
    }
    section.cover .cover-main > p:last-child a {
      border-color: #7c5cfc;
      color: #7c5cfc;
      border-radius: 30px;
      border-width: 2px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    section.cover .cover-main > p:last-child a:hover {
      background: #7c5cfc;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(124, 92, 252, 0.3);
    }
  </style>
</head>
<body>
  <div id="app">正在加载教程...</div>
  <script>
    window.$docsify = {
      name: '🚀 AI PM Agent 实战课',
      repo: 'https://github.com/icapk/Claude-AIPM',
      coverpage: true,
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索教程内容',
        noData: '没有找到相关结果',
        paths: 'auto',
        depth: 3,
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制',
      },
      progress: {
        position: "top",
        color: "var(--theme-color)",
        height: "3px",
      },
      tabs: {
        persist: true,
        sync: false,
        theme: 'classic',
      },
    }
  </script>
  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'default' })</script>
  <!-- Emoji -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
</body>
</html>
